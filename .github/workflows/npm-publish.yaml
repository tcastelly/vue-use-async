name: Publish to NPM
on:
  push:
    branches:
      - master

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build_publish:
    runs-on: ubuntu-latest
    steps:
      - name: detect package.version changes
        uses: MontyD/package-json-updated-action@master
        id: version-updated
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4
        if: steps.version-updated.outputs.has-updated

      - name: Setup Node
        uses: actions/setup-node@v4
        if: steps.version-updated.outputs.has-updated
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies build and publish 🔧📦
        if: steps.version-updated.outputs.has-updated
        run: |
          npm ci
          
          # Extract version from package.json
          VERSION=$(node -p "require('./package.json').version")
          echo "Detected version: $VERSION"

          # Check if version contains 'beta'
          if [[ $VERSION == *"beta"* ]]; then
            echo "Publishing with --tag beta"
            npm publish --tag beta
          else
            echo "Publishing as latest"
            npm publish
          fi
